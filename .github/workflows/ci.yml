name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (venv mirrors local + pyright config)
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -U pip
          .venv/bin/pip install -q -e ".[dev]"
      - name: Lint (ruff)
        run: .venv/bin/ruff check .
      - name: Format (ruff)
        run: .venv/bin/ruff format --check .
      - name: Type check (pyright)
        run: .venv/bin/pyright
      - name: Test + coverage gate
        run: .venv/bin/pytest -q --cov=github_watcher --cov-fail-under=60
      - name: Dependency audit (pip-audit)
        run: .venv/bin/pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: Format (prettier)
        run: npm run format:check
      - name: Type check (tsc)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Dependency audit (runtime deps)
        run: npm audit --omit=dev --audit-level=high

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
      - name: Vulnerability scan (Trivy fs)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
