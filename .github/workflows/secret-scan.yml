name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly full-history sweep

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the scan sees every commit
      # Run gitleaks directly in detect mode over the whole repo+history. This
      # avoids gitleaks-action's push-range diffing, which breaks on force-pushes
      # and root commits.
      - name: gitleaks detect
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --no-banner
