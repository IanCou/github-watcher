name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach SBOM to the release
      packages: write # push to GHCR
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@v7

      # GHCR image names must be lowercase; github.repository keeps the owner's case.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Sign image + attest provenance (cosign)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.spdx.json
